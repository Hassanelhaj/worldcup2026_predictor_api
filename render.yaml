services:
  - type: web
    name: wc2026-predictor-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements_api.txt
    startCommand: gunicorn api:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
    autoDeploy: true
